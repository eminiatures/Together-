<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Together Since ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#111,#1f1f1f,#000);
color:white;
text-align:center;
overflow:hidden;
}

.card{
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(255,0,90,.3);
width:90%;
max-width:700px;
}

h1{
font-size:40px;
margin-bottom:10px;
color:#ff4d6d;
}

.date{
font-size:20px;
opacity:.8;
margin-bottom:30px;
}

.counter{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.box{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
}

.number{
font-size:42px;
font-weight:bold;
color:#fff;
}

.label{
margin-top:8px;
font-size:15px;
opacity:.8;
}

.footer{
margin-top:35px;
font-size:14px;
opacity:.6;
}
</style>

</head>
<body>

<div class="card">

<h1>❤️ Together Since ❤️</h1>

<div class="date">
21 December 2025
</div>

<div class="counter">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">Days</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="footer">
Counting every second... ♾️
</div>

</div>

<script>

const startDate = new Date("2025-12-21T00:00:00");

function updateCounter(){

const now = new Date();

let diff = now - startDate;

if(diff < 0){
diff = 0;
}

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("days").textContent = days;
document.getElementById("hours").textContent = hours;
document.getElementById("minutes").textContent = minutes;
document.getElementById("seconds").textContent = seconds;

}

updateCounter();

setInterval(updateCounter,1000);

</script>

</body>
  </html>
