<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Together Forever ❤️</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>
<div class="hearts"></div>

<div class="container">

    <h1 class="title">
        Together Forever ❤️
    </h1>

    <p class="since">
        Since 21 December 2025
    </p>

    <div class="timer">

        <div class="box">
            <span id="days">000</span>
            <small>Days</small>
        </div>

        <div class="box">
            <span id="hours">00</span>
            <small>Hours</small>
        </div>

        <div class="box">
            <span id="minutes">00</span>
            <small>Minutes</small>
        </div>

        <div class="box">
            <span id="seconds">00</span>
            <small>Seconds</small>
        </div>

    </div>

    <p class="quote">
        "This clock will stop counting when I marry you 😼❤️"
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
